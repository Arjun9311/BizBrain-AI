version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=bizbrain_jwt_secret_key_12345!
      - DATABASE_URL=file:./dev.db
      - GEMINI_API_KEY=$GEMINI_API_KEY
    volumes:
      - ./backend/prisma/dev.db:/app/prisma/dev.db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
